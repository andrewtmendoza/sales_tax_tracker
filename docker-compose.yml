x-env-file: &env_file
  env_file:
    - path: .env
      required: true

services:
  db:
    <<: *env_file
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  rustfs:
    <<: *env_file
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - rustfs_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rustfs-init:
    <<: *env_file
    image: amazon/aws-cli:2.17.0
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - "export AWS_ACCESS_KEY_ID=\"$RUSTFS_ACCESS_KEY\" AWS_SECRET_ACCESS_KEY=\"$RUSTFS_SECRET_KEY\" AWS_DEFAULT_REGION=\"$RUSTFS_REGION\" && aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket \"$RUSTFS_BUCKET\" 2>/dev/null || aws --endpoint-url http://rustfs:9000 s3 mb \"s3://$RUSTFS_BUCKET\""
    restart: "no"

  web:
    <<: *env_file
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn salt_tracker.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-2} --access-logfile - --error-logfile -"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --url http://web:8000
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  rustfs_data:
