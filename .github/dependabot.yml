version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    ignore:
      - dependency-name: python
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
