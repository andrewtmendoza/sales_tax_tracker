name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  version-bump:
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify pyproject version bump
        run: |
          git fetch origin main --depth=1
          python - <<'PY'
          import re
          import subprocess
          import tomllib
          from pathlib import Path

          def read_version(pyproject_text: str) -> tuple[tuple[int, int, int], str]:
              version = tomllib.loads(pyproject_text)["project"]["version"]
              if not re.fullmatch(r"\d+\.\d+\.\d+", version):
                  raise SystemExit(f"Expected semantic version X.Y.Z in pyproject.toml, got {version!r}")
              return tuple(int(part) for part in version.split(".")), version

          base_text = subprocess.check_output(
              ["git", "show", "origin/main:pyproject.toml"],
              text=True,
          )
          head_text = Path("pyproject.toml").read_text()
          base_version, base_label = read_version(base_text)
          head_version, head_label = read_version(head_text)

          if head_version <= base_version:
              raise SystemExit(
                  "pyproject.toml version must be bumped for PRs to main. "
                  f"Base={base_label}, head={head_label}"
              )

          print(f"Version bump check passed: {base_label} -> {head_label}")
          PY

  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.6.6"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Decide heavy checks
        id: heavy-checks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          run_e2e=false
          run_docker_build=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --depth=1
            changed_files="$(git diff --name-only "origin/$BASE_REF...HEAD")"

            if [ "$BASE_REF" = "main" ]; then
              run_e2e=true
              run_docker_build=true
            elif printf '%s\n' "$changed_files" | grep -Eq \
              -e '^\.github/workflows/ci\.yml$' \
              -e '^pyproject\.toml$' \
              -e '^pytest\.ini$' \
              -e '^uv\.lock$' \
              -e '^static/' \
              -e '^templates/' \
              -e '^receipts/views\.py$' \
              -e '^receipts/api\.py$' \
              -e '^receipts/services/ingest\.py$' \
              -e '^receipts/tests/test_capture_e2e\.py$' \
              -e '^receipts/tests/test_views\.py$'; then
              run_e2e=true
            fi
          elif [ "$REF_NAME" = "main" ]; then
            run_e2e=true
            run_docker_build=true
          fi

          echo "run_e2e=$run_e2e" >> "$GITHUB_OUTPUT"
          echo "run_docker_build=$run_docker_build" >> "$GITHUB_OUTPUT"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Validate Compose files
        run: |
          cp .env.example .env
          docker compose config > /dev/null
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config > /dev/null

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Install Playwright browsers
        if: steps.heavy-checks.outputs.run_e2e == 'true'
        run: uv run playwright install --with-deps chromium

      - name: Run non-E2E tests
        run: uv run pytest -m "not e2e"

      - name: Run browser E2E tests
        if: steps.heavy-checks.outputs.run_e2e == 'true'
        run: uv run pytest -m e2e

      - name: Build Docker image
        if: steps.heavy-checks.outputs.run_docker_build == 'true'
        run: docker build .
