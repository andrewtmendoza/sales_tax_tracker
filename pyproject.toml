[project]
name = "sales-tax-tracker"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "boto3>=1.35",
    "django>=5.1,<5.2",
    "django-htmx>=1.19",
    "django-ninja>=1.3",
    "gunicorn>=23",
    "pillow>=10.4",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "requests>=2.32",
    "whitenoise>=6.9",
]

[dependency-groups]
dev = [
    "model-bakery>=1.20",
    "pre-commit>=3",
    "pytest>=8",
    "pytest-django>=4.9",
    "pytest-mock>=3.14",
    "ruff>=0.8",
]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv", "staticfiles", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
