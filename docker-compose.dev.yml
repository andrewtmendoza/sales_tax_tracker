services:
  web:
    image: sales_tax_tracker-web:dev
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DJANGO_DEBUG: "true"
    volumes:
      - .:/app
      - /app/.venv
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
