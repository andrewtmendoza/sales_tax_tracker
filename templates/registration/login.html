{% extends "base.html" %}

{% block title %}Log In · Sales Tax Tracker{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="surface-card auth-card">
    <div class="surface-body auth-body">
      <div>
        <h1 class="section-title">Log in</h1>
        <p class="section-note muted-copy">Sign in to capture and review receipts.</p>
      </div>

      {% if form.errors %}
        <div class="app-alert app-alert-error">Your username and password did not match.</div>
      {% endif %}

      <form method="post" class="stack-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <label class="field">
          <span class="field-label">Username</span>
          <input type="text" name="username" autofocus autocomplete="username" class="field-input" required />
        </label>

        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" name="password" autocomplete="current-password" class="field-input" required />
        </label>

        <button type="submit" class="app-button app-button-primary">Log in</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
