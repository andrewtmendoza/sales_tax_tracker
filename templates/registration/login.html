{% extends "base.html" %}

{% block title %}Log In · Sales Tax Tracker{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
  <div class="card bg-base-100 shadow-xl">
    <div class="card-body gap-4">
      <div>
        <h1 class="card-title text-2xl">Log in</h1>
        <p class="text-sm opacity-70">Sign in to capture and review receipts.</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-error text-sm">Your username and password did not match.</div>
      {% endif %}

      <form method="post" class="grid gap-3">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <label class="form-control">
          <div class="label"><span class="label-text">Username</span></div>
          <input type="text" name="username" autofocus autocomplete="username" class="input input-bordered" required />
        </label>

        <label class="form-control">
          <div class="label"><span class="label-text">Password</span></div>
          <input type="password" name="password" autocomplete="current-password" class="input input-bordered" required />
        </label>

        <button type="submit" class="btn btn-primary">Log in</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
